<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelPortal | Advanced Crime Intelligence Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>IntelPortal</h1>
            <p>Advanced Global Crime Data Intelligence Aggregator</p>
        </header>

        <section class="search-section">
            <form id="searchForm" class="search-container">
                <input type="text" name="q" id="searchInput" placeholder="Search by name, crime, or keyword..." required>
                <button type="submit">SEARCH INTELLIGENCE</button>
            </form>
        </section>

        <div id="loading" class="loading" style="display: none;">
            Searching global databases...
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <main id="resultsGrid" class="results-grid">
            <!-- Results will be injected here -->
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
